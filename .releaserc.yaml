---
branches:
  - main

repositoryUrl: "https://github.com/octomerge/gh-octomerge"
tagFormat: "v${version}"

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - { type: feat, release: minor }
        - { type: fix, release: patch }
        - { type: perf, release: patch }
        - { type: refactor, release: patch }
        - { type: docs, release: patch }
        - { type: ci, release: patch }
        - { type: build, release: patch }
        - { type: style, release: patch }
        - { type: test, release: patch }
        - { type: chore, release: patch, scope: "!release" }

  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
      presetConfig:
        types:
          - { type: feat, section: "✨ Features" }
          - { type: fix, section: "🐛 Bug Fixes" }
          - { type: perf, section: "⚡️ Performance" }
          - { type: refactor, section: "♻️ Refactoring" }
          - { type: docs, section: "📚 Documentation" }
          - { type: ci, section: "👷 CI" }
          - { type: build, section: "🔨 Build" }
          - { type: style, section: "🎨 Miscellaneous" }
          - { type: test, section: "✅ Miscellaneous" }
          - { type: chore, section: "🔧 Miscellaneous" }

  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md
      changelogTitle: "# Changelog\n\nAll notable changes to this project will be documented in this file."

  - - "@semantic-release/exec"
    - prepareCmd: "bash script/build.sh ${nextRelease.gitTag}"

  - - "@semantic-release/github"
    - assets:
        - path: dist/*
      releaseNameTemplate: "🚀 Version ${nextRelease.version}"
      successCommentCondition: "false"

  - - "@semantic-release/git"
    - assets:
        - CHANGELOG.md
      message: "chore(release): 🔖 ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
